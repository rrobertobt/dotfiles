$schema: https://raw.githubusercontent.com/JanDeDobbeleer/oh-my-posh/main/themes/schema.json

version: 4
transient_prompt:
  background: transparent
  foreground: "magenta"
  template: "% "

blocks:
  - type: prompt
    newline: true
    alignment: left
    segments:
      # - type: executiontime
      #   style: plain
      #   background: "blue"
      #   foreground: "transparent"
      #   template: " took {{ .FormattedMs }} "
      #   options:
      #     style: round
      #     threshold: 100

      - type: status
        style: plain
        background: "#880000"
        foreground: "#ff8888"
        template: "{{ if gt .Code 0 }} {{ .Code }} {{ end }}"

      - type: root
        style: plain
        background: "#ffcc88"
        foreground: "#222222"
        template: "\uf0e7"

      # - type: os
      #   style: plain
      #   background: "#222222"
      #   foreground: "#666666"
      #   template: " {{ if .WSL }}\uebcc {{ end }}{{ .Icon }}"

      # - type: session
      #   style: plain
      #   # background: "#222222"
      #   # foreground: "#666666"
      #   background: "darkGray"
      #   foreground: "lightWhite"
      #   template: " {{ if .SSHSession }}\ueba9 {{ end }}{{ .UserName }}@{{ .HostName }} "

      - type: path
        style: plain
        background: "lightWhite"
        foreground: "darkGray"
        template: " {{ .Path }} "
        options:
          folder_icon: "…"
          style: mixed

      - type: git
        style: plain
        background: "red"
        foreground: "transparent"
        template: " 
          {{ .UpstreamIcon }}{{ .HEAD }} {{ if .BranchStatus }}{{ .BranchStatus }}{{ end }} {{ if .Working.Changed }}  {{ .Working.String }}{{ end }} {{ if and (.Working.Changed) (.Staging.Changed) }} |{{ end }}{{ if .Staging.Changed }}  {{ .Staging.String }}{{ end }} {{ if gt .StashCount 0 }} $({{ .StashCount }}){{ end }} "
        options:
          status_formats:
            Unmerged: "!(%d)"
            Deleted: "-(%d)"
            Added: "+(%d)"
            Modified: "*(%d)"
            Untracked: "?(%d)"
          branch_icon: " "
          cherry_pick_icon: " "
          commit_icon: " "
          fetch_status: true
          fetch_push_status: true
          fetch_upstream_icon: false
          merge_icon: " "
          no_commits_icon: " "
          rebase_icon: " "
          revert_icon: " "
          tag_icon: " "

      - type: dotnet
        style: plain
        background: "#7014eb"
        foreground: "#ffffff"
        template: " \ue77f "
        options:
          fetch_version: false

      - type: go
        style: plain
        background: "#7FD5EA"
        foreground: "#ffffff"
        template: " \ue626 "
        options:
          fetch_version: false

      - type: python
        style: plain
        background: "#906cff"
        foreground: "#100e23"
        template: " \ue235 "
        options:
          fetch_version: false

      - type: rust
        style: plain
        background: "#99908a"
        foreground: "#193549"
        template: " \ue7a8 "
        options:
          fetch_version: false

  - type: prompt
    newline: false
    alignment: right
    segments:
      - type: time
        style: plain
        foreground: "#007ACC"
        options:
          time_format: 15:04:05

  - type: prompt
    alignment: left
    newline: true
    segments:
      - type: executiontime
        style: plain
        foreground: "magenta"
        template: "<white>took</> {{ .FormattedMs }} "
        options:
          style: round
          threshold: 200
      - type: shell
        style: plain
        foreground_templates:
          - "{{if gt .Code 0 }}red{{end}}"
          - "{{if eq .Code 0 }}magenta{{end}}"
        template: "{{ .Name }} "
        options:
          mapped_shell_names:
            pwsh: "❯"
            shell: "❯"
            cmd: ">"
            lua: ">"
            nu: ":)"
            fish: "~>"
            zsh: "%"
            bash: "$"


